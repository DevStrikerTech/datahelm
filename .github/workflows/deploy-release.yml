name: Deploy Release

on:
  workflow_run:
    workflows:
      - Docker Release
    types:
      - completed
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: Image tag to deploy
        required: true
        default: latest
        type: string

permissions:
  contents: read

jobs:
  deploy_production_auto:
    name: Auto Deploy Production
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate required production secrets
        id: preflight
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_APP_ENV_FILE: ${{ secrets.PROD_APP_ENV_FILE }}
        run: |
          set -eu
          if [ -z "${GHCR_USERNAME}" ] || [ -z "${GHCR_READ_TOKEN}" ] || [ -z "${PROD_SSH_HOST}" ] || [ -z "${PROD_SSH_USER}" ] || [ -z "${PROD_SSH_KEY}" ] || [ -z "${PROD_APP_ENV_FILE}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip production deploy (missing secrets)
        if: steps.preflight.outputs.ready != 'true'
        run: echo "Skipping production deploy until required secrets are configured."

      - name: Deploy to production host over SSH
        if: steps.preflight.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          IMAGE_TAG: latest
          CONTAINER_NAME: datahelm-eng-core
          APP_ENV_FILE: ${{ secrets.PROD_APP_ENV_FILE }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          envs: GHCR_USERNAME,GHCR_READ_TOKEN,IMAGE_NAME,IMAGE_TAG,CONTAINER_NAME,APP_ENV_FILE
          script: |
            set -eu
            echo "${GHCR_READ_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            IMAGE_REF="${IMAGE_NAME}:${IMAGE_TAG}"
            docker pull "${IMAGE_REF}"
            docker rm -f "${CONTAINER_NAME}" || true
            docker run -d --name "${CONTAINER_NAME}" --restart unless-stopped \
              --env-file "${APP_ENV_FILE}" \
              -p 3000:3000 \
              "${IMAGE_REF}"

  deploy_staging_manual:
    name: Manual Deploy Staging
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Validate required staging secrets
        id: preflight
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_APP_ENV_FILE: ${{ secrets.STAGING_APP_ENV_FILE }}
        run: |
          set -eu
          if [ -z "${GHCR_USERNAME}" ] || [ -z "${GHCR_READ_TOKEN}" ] || [ -z "${STAGING_SSH_HOST}" ] || [ -z "${STAGING_SSH_USER}" ] || [ -z "${STAGING_SSH_KEY}" ] || [ -z "${STAGING_APP_ENV_FILE}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip staging deploy (missing secrets)
        if: steps.preflight.outputs.ready != 'true'
        run: echo "Skipping staging deploy until required secrets are configured."

      - name: Deploy to staging host over SSH
        if: steps.preflight.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          CONTAINER_NAME: datahelm-eng-core-staging
          APP_ENV_FILE: ${{ secrets.STAGING_APP_ENV_FILE }}
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: 22
          envs: GHCR_USERNAME,GHCR_READ_TOKEN,IMAGE_NAME,IMAGE_TAG,CONTAINER_NAME,APP_ENV_FILE
          script: |
            set -eu
            echo "${GHCR_READ_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            IMAGE_REF="${IMAGE_NAME}:${IMAGE_TAG}"
            docker pull "${IMAGE_REF}"
            docker rm -f "${CONTAINER_NAME}" || true
            docker run -d --name "${CONTAINER_NAME}" --restart unless-stopped \
              --env-file "${APP_ENV_FILE}" \
              -p 3000:3000 \
              "${IMAGE_REF}"

  deploy_production_manual:
    name: Manual Deploy Production
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate required production secrets
        id: preflight
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_APP_ENV_FILE: ${{ secrets.PROD_APP_ENV_FILE }}
        run: |
          set -eu
          if [ -z "${GHCR_USERNAME}" ] || [ -z "${GHCR_READ_TOKEN}" ] || [ -z "${PROD_SSH_HOST}" ] || [ -z "${PROD_SSH_USER}" ] || [ -z "${PROD_SSH_KEY}" ] || [ -z "${PROD_APP_ENV_FILE}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip production deploy (missing secrets)
        if: steps.preflight.outputs.ready != 'true'
        run: echo "Skipping production deploy until required secrets are configured."

      - name: Deploy to production host over SSH
        if: steps.preflight.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          IMAGE_NAME: ghcr.io/${{ github.repository }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          CONTAINER_NAME: datahelm-eng-core
          APP_ENV_FILE: ${{ secrets.PROD_APP_ENV_FILE }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          envs: GHCR_USERNAME,GHCR_READ_TOKEN,IMAGE_NAME,IMAGE_TAG,CONTAINER_NAME,APP_ENV_FILE
          script: |
            set -eu
            echo "${GHCR_READ_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            IMAGE_REF="${IMAGE_NAME}:${IMAGE_TAG}"
            docker pull "${IMAGE_REF}"
            docker rm -f "${CONTAINER_NAME}" || true
            docker run -d --name "${CONTAINER_NAME}" --restart unless-stopped \
              --env-file "${APP_ENV_FILE}" \
              -p 3000:3000 \
              "${IMAGE_REF}"
